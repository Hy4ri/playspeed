<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PlaySpeed</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="main-row">
      <button id="btn-decrease" class="btn-adjust" title="Decrease speed by 0.25" aria-label="Decrease speed by 0.25">−</button>
      <div class="speed-display" id="speed-display" role="status" aria-live="polite" aria-atomic="true">--x</div>
      <button id="btn-increase" class="btn-adjust" title="Increase speed by 0.25" aria-label="Increase speed by 0.25">+</button>
    </div>
    <div class="fixed-row" role="group" aria-label="Preset speeds">
      <button class="fixed-speed-btn" data-speed="0.25">0.25</button>
      <button class="fixed-speed-btn" data-speed="0.5">0.5</button>
      <button class="fixed-speed-btn" data-speed="0.75">0.75</button>
      <button class="fixed-speed-btn" data-speed="1">1</button>
      <button class="fixed-speed-btn" data-speed="1.5">1.5</button>
      <button class="fixed-speed-btn" data-speed="1.75">1.75</button>
      <button class="fixed-speed-btn" data-speed="2">2</button>
      <button class="fixed-speed-btn" data-speed="2.5">2.5</button>
    </div>
    <button id="btn-exclude" class="btn-exclude">Exclude this site</button>
    <div id="live-section" class="live-section" style="display: none">
      <div class="live-header">
        <span class="live-dot" aria-hidden="true"></span>
        <span id="live-label" class="live-label" role="status" aria-live="polite">Live stream detected</span>
      </div>
      <div class="live-body">
        <div class="live-now">
          <span class="live-now-label">Playing at</span>
          <span id="live-now-speed" class="live-now-speed">1x</span>
        </div>
      </div>
      <p id="live-hint" class="live-hint">Live streams default to 1x speed. Adjust speed above to change.</p>
    </div>
    <div class="footer">
      <button id="options-link" type="button" class="link-button">Exclusions…</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
